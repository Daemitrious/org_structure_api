services:
  app:
    build: .
    container_name: org_structure_api
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://postgres:postgres@db:5432/org_structure_db}
      APP_NAME: ${APP_NAME:-Organization Structure API}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16
    container_name: org_structure_db
    environment:
      POSTGRES_DB: org_structure_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d org_structure_db"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
